version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host  # shares host network so localhost:8080 (OBP) and localhost:6379 (Redis) are reachable
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5178}
      - ORIGIN=http://localhost:${PORT:-5178}
      - PUBLIC_OBP_BASE_URL=http://localhost:8080
      - OBP_OAUTH_CLIENT_ID=${OBP_OAUTH_CLIENT_ID}
      - OBP_OAUTH_CLIENT_SECRET=${OBP_OAUTH_CLIENT_SECRET}
      - APP_CALLBACK_URL=${APP_CALLBACK_URL:-http://localhost:${PORT:-5178}/login/obp/callback}
      - REDIS_HOST=localhost  # host network mode: Redis is reachable via localhost
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
